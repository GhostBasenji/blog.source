name: Deploy Hugo Site

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build site
        run: hugo --minify

      - name: Pagefind index
        run: npx pagefind --site public

      - name: Deploy to GitHub Pages repo
        run: |
          cd public
          git init

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Deploy: ${{ github.event.head_commit.message }}" || echo "No changes"

          git branch -M master

          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/ghostbasenji/ghostbasenji.github.io.git

          git push --force origin master
