name: Deploy Hugo Site

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Получаем код
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 2. Устанавливаем Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      # 3. Node.js нужен для Pagefind
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Сборка сайта
      - name: Build Hugo site
        run: hugo --minify

      # 5. Индексация поиска Pagefind
      - name: Index search (Pagefind)
        run: npx pagefind --site public

      # 6. Деплой в ghostbasenji.github.io
      - name: Deploy site
        run: |
          cd public

          touch .nojekyll

          git init
          git checkout -b master

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Deploy site" || echo "No changes to commit"

          git remote add origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/ghostbasenji/ghostbasenji.github.io.git
          git push --force origin master
